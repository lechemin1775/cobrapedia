name: Écosystème Rituel Quotidien
on:
  schedule:
    - cron: '0 6,8,18 * * *' 
  workflow_dispatch:

jobs:
  lancement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node sondage_bot.js
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
